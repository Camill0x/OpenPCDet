DATASET: CarlaNuScenes6Dataset
DATA_PATH: ../../datasets/openpcdet/carla_nuscenes6

POINT_CLOUD_RANGE: [-54.0, -54.0, -5.0, 54.0, 54.0, 3.0]

DATA_SPLIT: {
    'train': train,
    'test': val
}

INFO_PATH: {
    'train': ['infos/infos_train.pkl'],
    'test': ['infos/infos_val.pkl'],
}

GET_ITEM_LIST: ["points"]
FOV_POINTS_ONLY: False
APPEND_ZERO_TIMESTAMP: True
APPEND_ZERO_VELOCITY_TO_GT: True

DATA_AUGMENTOR:
    DISABLE_AUG_LIST: []
    AUG_CONFIG_LIST:
        - NAME: random_world_flip
          ALONG_AXIS_LIST: ['x', 'y']

        - NAME: random_world_rotation
          WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

        - NAME: random_world_scaling
          WORLD_SCALE_RANGE: [0.9, 1.1]

        - NAME: random_world_translation
          NOISE_TRANSLATE_STD: [0.5, 0.5, 0.5]

POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'intensity', 'timestamp'],
    src_feature_list: ['x', 'y', 'z', 'intensity', 'timestamp'],
}

DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: True

    - NAME: shuffle_points
      SHUFFLE_ENABLED: {
        'train': True,
        'test': False
      }

    - NAME: transform_points_to_voxels
      VOXEL_SIZE: [0.075, 0.075, 0.2]
      MAX_POINTS_PER_VOXEL: 10
      MAX_NUMBER_OF_VOXELS: {
        'train': 120000,
        'test': 160000
      }

EVAL_METRIC: kitti
